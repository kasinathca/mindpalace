# .github/workflows/deploy.yml
#
# Runs on every push to `main` (i.e. approved PR merges).
# Builds Docker images for the API and web frontend, runs database
# migrations, then deploys to the configured hosting provider.
#
# Required repository secrets:
#   DATABASE_URL      — production Postgres connection string
#   REDIS_URL         — production Redis connection string
#   JWT_ACCESS_SECRET — access token signing secret
#   JWT_REFRESH_SECRET — refresh token signing secret
#
# Adapt the final "Deploy application" step for your hosting provider
# (Render, Railway, DigitalOcean App Platform, AWS ECS, etc.).
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy to Production

on:
  push:
    branches: [main]

# Prevent concurrent deployments — queue new runs behind the active one.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build, Migrate & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js & pnpm ─────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via Corepack
        run: corepack enable

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # ── Build Docker images ────────────────────────────────────────────────
      - name: Build API Docker image
        run: |
          docker build \
            -t mindpalace-api:${{ github.sha }} \
            -t mindpalace-api:latest \
            ./apps/api

      - name: Build web Docker image
        run: |
          docker build \
            -t mindpalace-web:${{ github.sha }} \
            -t mindpalace-web:latest \
            ./apps/web

      # ── Database migrations ────────────────────────────────────────────────
      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run --rm \
            -e DATABASE_URL="${DATABASE_URL}" \
            mindpalace-api:${{ github.sha }} \
            pnpm prisma migrate deploy

      # ── Deploy ─────────────────────────────────────────────────────────────
      - name: Deploy application
        run: |
          # Replace this step with your hosting provider's deploy command.
          # Examples:
          #   Render:              curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          #   Railway:             railway up --service mindpalace
          #   DO App Platform:     doctl apps create-deployment "$APP_ID"
          #   AWS ECS (Fargate):   aws ecs update-service --cluster mp --service mp-api --force-new-deployment
          echo "Deploy step: configure for your hosting provider."
          echo "Image tag: ${{ github.sha }}"

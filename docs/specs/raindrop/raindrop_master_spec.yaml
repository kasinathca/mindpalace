schema_version: "1.0.0"
generated_at_utc: "2026-03-24"
source:
	file: "raindrop_help_compiled.md"
	total_lines: 4126
	coverage_policy: "include_all_claims_and_mark_confidence"
	confidence_levels:
		- explicit
		- strongly_implied

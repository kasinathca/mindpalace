normalized_workflows:
	- id: wf.search.full_text
		actor: end_user
		trigger: "Need to find content inside pages/PDF/EPUB"
		preconditions:
			- pro_subscription
			- bookmark_copied_and_indexed
		steps:
			- open_search_field
			- enter_query
			- execute_search
			- refine_with_operators_or_filters
		expected_outcome: "Result set includes content matches"
		edge_cases:
			- indexing_delay_for_new_bookmarks
			- no_ocr_for_scanned_pdfs

	- id: wf.search.disable_full_text
		actor: end_user
		steps:
			- choose_in_title_description_filter
			- or_prefix_query_with_info_colon

	- id: wf.cleanup.duplicates
		actor: end_user
		preconditions: [pro_subscription]
		steps:
			- open_search_filter_duplicates
			- select_items
			- delete_selected
		safety_note: "Duplicate view intentionally excludes original items"

	- id: wf.cleanup.broken_links
		actor: end_user
		preconditions: [pro_subscription]
		steps:
			- open_search_filter_broken_links
			- review_ghost_marked_items
			- select_items
			- delete_selected

	- id: wf.bookmark.create.manual
		actor: end_user
		steps:
			- open_web_app
			- click_add
			- paste_url
			- save

	- id: wf.bookmark.create.extension
		actor: end_user
		steps:
			- visit_target_page
			- click_extension_or_shortcut
			- choose_collection_and_tags
			- save

	- id: wf.bookmark.save_all_tabs
		actor: end_user
		steps:
			- open_extension_context_menu
			- run_save_tabs_action
			- verify_date_tag_assigned

	- id: wf.bookmark.bulk_move
		actor: end_user
		steps:
			- multi_select_items
			- click_move
			- choose_destination_collection

	- id: wf.bookmark.bulk_tag
		actor: end_user
		steps:
			- multi_select_items
			- click_add_tags
			- enter_comma_separated_tags

	- id: wf.bookmark.delete_single
		actor: end_user
		steps:
			- hover_item
			- click_trash_icon

	- id: wf.bookmark.delete_bulk
		actor: end_user
		steps:
			- multi_select_items
			- click_delete

	- id: wf.preview.refresh
		actor: end_user
		steps:
			- open_item_context_menu
			- click_refresh_preview

	- id: wf.tags.manage_single
		actor: end_user
		steps:
			- open_item_edit
			- update_tags
			- save

	- id: wf.thumbnail.change
		actor: end_user
		steps:
			- open_item_edit
			- click_thumbnail
			- choose_detected_image_or_upload

	- id: wf.reminder.create
		actor: end_user
		steps:
			- open_bookmark_edit
			- set_reminder_datetime
			- save

	- id: wf.backup.request_manual
		actor: end_user
		steps:
			- open_backup_settings
			- click_create_new
			- wait_for_email_link

	- id: wf.backup.enable_cloud_auto
		actor: end_user
		preconditions: [pro_subscription]
		steps:
			- open_backup_settings
			- connect_cloud_provider
			- enable_toggle
			- verify_initial_backup_created

	- id: wf.backup.restore
		actor: end_user
		steps:
			- open_import_page
			- upload_backup_file
			- start_import

	- id: wf.account.transfer
		actor: end_user
		steps:
			- export_backup_from_source_account
			- logout_source
			- login_destination_account
			- import_backup

	- id: wf.account.cancel_subscription
		actor: end_user
		branches:
			- web_checkout: [open_settings_subscription, change_subscription, manage, cancel]
			- app_store: [cancel_in_apple_subscriptions]
			- play_store: [cancel_in_google_play]

	- id: wf.billing.change_payment_method
		actor: end_user
		steps:
			- open_subscription_settings
			- click_change_subscription
			- manage
			- update_payment_method
			- set_default

	- id: wf.collaboration.invite
		actor: collection_owner
		steps:
			- open_collection_settings
			- add_collaborator_by_email_or_link
			- send_invite

	- id: wf.public_page.publish
		actor: end_user
		steps:
			- select_collection
			- enable_public_visibility
			- share_public_url

	- id: wf.extension.enable_saved_indicator
		actor: end_user
		steps:
			- open_extension
			- open_extension_settings
			- enable_saved_page_indicator_permission

	- id: wf.ai.assistant_organize_bulk
		actor: end_user
		preconditions: [pro_subscription, ai_assistant_enabled]
		steps:
			- open_ai_assistant
			- issue_plain_language_instruction
			- review_proposed_changes
			- apply_changes

	- id: wf.mcp.connect_vscode
		actor: developer_user
		preconditions: [beta_access]
		steps:
			- create_mcp_config_file
			- add_raindrop_mcp_server_entry
			- restart_client
			- authenticate
			- run_queries

use_cases:
	- id: uc.research_archive
		persona: researcher
		objective: "Persist long-term web knowledge with searchable content"
		enabling_features:
			- feat.bookmark.create
			- feat.search.full_text
			- feat.backup.auto
	- id: uc.read_later
		persona: busy_professional
		objective: "Capture now, revisit later"
		enabling_features:
			- feat.bookmark.create
			- feat.reminders.bookmark
			- feat.search.recent
	- id: uc.team_curation
		persona: small_team
		objective: "Co-curate links for projects"
		enabling_features:
			- feat.collab.shared_collections
			- feat.tags.system
			- feat.bookmark.bulk
	- id: uc_content_cleanup
		persona: power_user
		objective: "Keep archive healthy"
		enabling_features:
			- feat.bookmark.duplicates
			- feat.bookmark.broken_links
	- id: uc_public_knowledge_page
		persona: creator
		objective: "Publish curated resources"
		enabling_features:
			- feat.public_page
			- feat.sorting_and_views
	- id: uc_cross_device_capture
		persona: multi_device_user
		objective: "Save from browser and phone with sync"
		enabling_features:
			- feat.extension.toolbar_save
			- feat.bookmark.create
			- feat.search.recent
	- id: uc_bulk_session_save
		persona: tab_heavy_user
		objective: "Archive active browsing session"
		enabling_features:
			- feat.extension.save_tabs
			- feat.tags.system
	- id: uc_pdf_highlighting
		persona: student
		objective: "Highlight and retrieve passages from PDFs"
		enabling_features:
			- feat.highlights.pdf
			- feat.search.full_text
	- id: uc_api_integrator
		persona: developer
		objective: "Build custom workflows around bookmark data"
		enabling_features:
			- feat.api.public
			- feat.automation.ifttt
			- feat.automation.n8n
	- id: uc_ai_organization
		persona: overwhelmed_user
		objective: "Auto-assign collections and tags"
		enabling_features:
			- feat.ai_suggestions
			- feat.ai_assistant.stella


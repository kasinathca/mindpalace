pricing_gates:
	free_plan:
		included:
			- unlimited_bookmarks
			- unlimited_collections
			- collaboration_core
			- manual_backups
		restricted:
			- full_text_search
			- permanent_copy
			- duplicate_filter
			- broken_links_filter
			- automatic_cloud_backups
			- advanced_ai_features
	pro_plan:
		unlocks:
			- full_text_search
			- permanent_copy
			- ai_search_semantics
			- ai_assistant_and_suggestions
			- broken_links_and_duplicates
			- larger_upload_limit
			- cloud_backup_automation
		commercial_notes:
			- monthly_or_yearly
			- yearly_discount_approximately_20_percent
			- refund_policy_30_days

security_privacy:
	hosting:
		provider: aws
		primary_region: frankfurt_germany
		confidence: explicit
	transport_security:
		- https_required
		- rsa_2048
		- pfs
		- sha_256
	storage_safety:
		- three_copies_across_distributed_data_centers
		- point_in_time_restore_within_past_year
	access_control:
		- temporary_direct_file_urls_expire_around_10_minutes
		- private_by_default_unless_collection_public
	ai_privacy:
		- private_model
		- no_training_on_user_data
		- no_public_ai_api_data_routing_claimed

limitations_and_constraints:
	- id: lim.search.index_delay
		statement: "Full-text index is not immediate"
		confidence: explicit
	- id: lim.search.max_chars
		statement: "Index supports up to 300000 chars per document"
		confidence: explicit
	- id: lim.search.ocr
		statement: "No OCR in PDF full-text"
		confidence: explicit
	- id: lim.backups.max_count
		statement: "Up to 30 recent backups retained"
		confidence: explicit
	- id: lim.backups.scope
		statement: "Uploaded files and collection icons excluded from backup"
		confidence: explicit
	- id: lim.extension.omnibox_availability
		statement: "Address bar keyword search unavailable in Safari and Vivaldi"
		confidence: explicit

troubleshooting_playbooks:
	- id: tp.sync_issue
		symptoms:
			- recent_changes_not_visible_on_other_device
		checks:
			- verify_login_to_same_account
			- check_network
			- force_refresh_or_restart
			- inspect_service_status
	- id: tp.false_broken_links
		symptoms:
			- live_links_marked_as_broken
		checks:
			- retry_check
			- adjust_checker_mode
			- verify_target_site_rate_limits_or_bot_protection
	- id: tp.login_problems
		symptoms:
			- cannot_sign_in
		checks:
